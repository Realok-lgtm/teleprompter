name: Teleprompter
options:
  bundleIdPrefix: com.rsenterprises
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: "Automatic"
targets:
  Teleprompter:
    type: application
    platform: iOS
    sources:
      - Teleprompter
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rsenterprises.teleprompter
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Teleprompter/Info.plist
        CODE_SIGN_STYLE: Automatic
        ENABLE_USER_SCRIPT_SANDBOXING: YES
